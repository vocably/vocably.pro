<div class="container-xl top">
  <app-header [title]="'feedback.title' | transloco"></app-header>
</div>
<div class="container bottom">
  <form (ngSubmit)="submitFeedback()" *ngIf="userData$ | async as useData">
    <p>
      {{ 'feedback.p1' | transloco }}
    </p>
    <p>
      {{ 'feedback.p2' | transloco }}
    </p>
    <p>
      {{ 'feedback.p3' | transloco }}
      <strong>{{ useData.email }}</strong
      >.
      <ng-container *ngIf="useData.email.includes('privaterelay')">
        {{ 'feedback.apple_email' | transloco }}
      </ng-container>
    </p>
    <textarea
      class="form-control mb-1"
      name="feedback"
      style="height: 6rem"
      [placeholder]="'feedback.placeholder' | transloco"
      [(ngModel)]="feedback"
    ></textarea>
    <div class="mb-1">
      <button
        data-test="submit"
        type="submit"
        class="button"
        [disabled]="feedback.trim() === '' || isSubmitting"
      >
        {{ 'feedback.submit' | transloco }}
      </button>
      <ion-spinner *ngIf="isSubmitting" name="dots"></ion-spinner>
    </div>
    <div class="success" [class.expanded]="success">
      <div class="success-content">
        {{ 'feedback.success' | transloco }}
        <pre style="margin: 1rem 0 0 0; white-space: pre-wrap">{{
          lastFeedback
        }}</pre>
      </div>
    </div>
    <div *ngIf="error" class="text-danger">
      {{ 'feedback.error' | transloco }}
    </div>
  </form>
</div>
