<h1 mat-dialog-title style="font-size: 100%">
  <mat-icon color="warn" class="middle">warning</mat-icon>
  {{ 'import.failure.title' | transloco }}
</h1>
<div mat-dialog-content>
  <p>{{ 'import.failure.error' | transloco }}</p>
  <p>{{ 'import.failure.logged' | transloco }}</p>
  {{ 'import.failure.try_again' | transloco }}
</div>
<div mat-dialog-actions style="justify-content: flex-end">
  <button color="accent" mat-button (click)="dialogRef.close()" cdkFocusInitial>
    {{ 'import.failure.close' | transloco }}
  </button>
</div>
