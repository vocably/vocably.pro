<h1 mat-dialog-title>{{ 'settings.delete_dialog.title' | transloco }}</h1>
<div mat-dialog-content>
  <p>
    {{ 'settings.delete_dialog.confirm' | transloco }}
  </p>
</div>
<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="true" data-test="yes-please">
    {{ 'settings.delete_dialog.yes' | transloco }}
  </button>
  <button mat-button (click)="onNoClick()">
    {{ 'settings.delete_dialog.no' | transloco }}
  </button>
</mat-dialog-actions>
