<header class="header">
  <div class="header-items display-flex align-items-center">
    <ng-container *ngIf="isLoggedIn !== null">
      <div
        class="flex-1 display-md-block"
        [class.display-none]="dense && title"
      >
        <a [routerLink]="['/']"><app-logo class="logo-image"></app-logo></a>
      </div>
      <div
        class="flex-1 mat-headline-6 m-0 text-md-center text-emphasize"
        [class.text-center]="!dense"
        *ngIf="title"
      >
        {{ title }}
      </div>
      <div
        class="flex-1 display-inline-flex justify-content-end align-items-center"
        *ngIf="isLoggedIn"
      >
        <ng-content></ng-content>
        <button
          class="unstyled ml-1 text-emphasize"
          [matMenuTriggerFor]="menu"
          data-test="main-menu"
        >
          <mat-icon aria-hidden="false" aria-label="Menu" class="middle"
            >menu</mat-icon
          >
        </button>
        <mat-menu #menu="matMenu">
          <a mat-menu-item [routerLink]="['/welcome']"
            ><mat-icon>person_raised_hand</mat-icon>Setup (Welcome)</a
          >
          <a mat-menu-item [routerLink]="['/membership']"
            ><mat-icon>crown</mat-icon>Premium</a
          >
          <a mat-menu-item [routerLink]="['/settings']"
            ><mat-icon>settings</mat-icon>Settings</a
          >
          <a mat-menu-item [routerLink]="['/import']"
            ><mat-icon>csv</mat-icon>Import</a
          >
          <a mat-menu-item [routerLink]="['/feedback']"
            ><mat-icon>chat</mat-icon>Feedback</a
          >
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="signOut()">
            <mat-icon>logout</mat-icon>Sign Out
          </button>
        </mat-menu>
      </div>
    </ng-container>
  </div>
</header>
