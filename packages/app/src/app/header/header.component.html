<header class="header">
  <div class="header-items display-flex align-items-center">
    <ng-container *ngIf="isLoggedIn !== null">
      <div
        class="flex-1 display-md-block"
        [class.display-none]="dense && title"
      >
        <a [routerLink]="['/']"><app-logo class="logo-image"></app-logo></a>
      </div>
      <div
        class="flex-1 mat-headline-6 m-0 text-md-center text-emphasize"
        [class.text-center]="!dense"
        *ngIf="title"
      >
        {{ title | transloco }}
      </div>
      <div
        class="flex-1 display-inline-flex justify-content-end align-items-center"
        *ngIf="isLoggedIn"
      >
        <ng-content></ng-content>
        <button
          class="unstyled ml-1 text-emphasize"
          [matMenuTriggerFor]="menu"
          data-test="main-menu"
        >
          <mat-icon
            aria-hidden="false"
            [attr.aria-label]="'header.menu' | transloco"
            class="middle"
            >menu</mat-icon
          >
        </button>
        <mat-menu #menu="matMenu">
          <a mat-menu-item [routerLink]="['/welcome']"
            ><mat-icon>person_raised_hand</mat-icon
            >{{ 'header.setup' | transloco }}</a
          >
          <a mat-menu-item [routerLink]="['/membership']"
            ><mat-icon>crown</mat-icon>{{ 'header.premium' | transloco }}</a
          >
          <a mat-menu-item [routerLink]="['/settings']"
            ><mat-icon>settings</mat-icon>{{ 'header.settings' | transloco }}</a
          >
          <a
            mat-menu-item
            href="https://vocably.pro/pdf.html"
            target="_blank"
            rel="noopener"
            ><mat-icon>picture_as_pdf</mat-icon
            >{{ 'header.pdf_reader' | transloco }}</a
          >
          <a mat-menu-item [routerLink]="['/import']"
            ><mat-icon>csv</mat-icon>{{ 'header.import' | transloco }}</a
          >
          <a mat-menu-item [routerLink]="['/feedback']"
            ><mat-icon>chat</mat-icon>{{ 'header.feedback' | transloco }}</a
          >
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="signOut()">
            <mat-icon>logout</mat-icon>{{ 'header.sign_out' | transloco }}
          </button>
        </mat-menu>
      </div>
    </ng-container>
  </div>
</header>
