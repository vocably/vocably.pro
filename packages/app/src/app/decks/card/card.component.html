<div>
  <div class="inline-block lead-1 text-emphasize">
    <app-play-sound
      [text]="item.data.source"
      [language]="item.data.language"
    ></app-play-sound>
    {{ item.data.source }}
  </div>

  <div *ngIf="item.data.ipa" class="small inline-block ml-0_5">
    <span class="inline-block invisible-space">&nbsp;</span>
    /{{ sanitizeTranscript(item.data.ipa) }}/
  </div>

  <div *ngIf="item.data.g" class="small inline-block ml-0_5">
    <span class="inline-block invisible-space">&nbsp;</span>
    ({{ item.data.g }})
  </div>

  <div *ngIf="item.data.partOfSpeech" class="small inline-block ml-0_5">
    <span class="inline-block invisible-space">&nbsp;</span>
    {{ item.data.partOfSpeech }}
  </div>
</div>
<div class="pl-1_5">
  <ul class="outside" text-list [text]="item.data.definition">
    @if (item.data.translation) {
      <li class="text-emphasize">{{ item.data.translation }}</li>
    }
  </ul>
</div>
