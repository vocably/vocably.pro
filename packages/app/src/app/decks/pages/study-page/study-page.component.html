<div class="study-container">
  @if (necessaryData.isLoading()) {
    <div class="hero max">
      <div class="hero-body text-center">
        <ion-spinner name="dots" class="mr-1"></ion-spinner
        >{{ 'decks.study.loading' | transloco }}
      </div>
    </div>
  } @else if (necessaryData.error()) {
    <div class="hero max">
      <div class="hero-body text-center">
        <div style="font-size: 5rem" class="text-danger">
          <mat-icon class="error-icon" inline>error</mat-icon>
        </div>
        <p>{{ necessaryData.error() }}</p>
        <p>{{ 'decks.study.reload' | transloco }}</p>
      </div>
    </div>
  } @else {
    <app-srs-list
      class="study-list"
      [studySteps]="necessaryData.value().studySteps"
      [allCards]="allCards"
      [cards]="cards"
      [total]="total"
      [prerenderedCards]="necessaryData.value().predefinedCards"
      (grade)="onGrade($event)"
      (oneMoreRound)="reloadCards()"
    ></app-srs-list>
  }
  <div class="nav">
    <app-back-button></app-back-button>
  </div>
</div>
