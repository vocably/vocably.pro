<div class="gradient">
  <div *ngIf="isDesktop" class="mb-1">
    <a
      class="button block track-click"
      id="practice-button"
      [routerLink]="['study']"
    >
      {{ 'decks.dashboard.study' | transloco }}
    </a>
  </div>
  <ul class="unstyled separated mb-1" data-test="dashboard-cards">
    <li *ngFor="let item of cardItems.slice(0, 7)">
      <app-card [item]="item"></app-card>
    </li>
  </ul>
</div>

<div class="text-center deck-options">
  <a
    [routerLink]="['edit']"
    data-test="edit-button"
    id="edit-deck"
    class="lead-0_5 track-click inline-block"
    >{{ 'decks.dashboard.edit_deck' | transloco
    }}<span class="text-decoration-none ml-0_5 inline-block"
      >({{ cardItems.length }})</span
    ></a
  >
</div>
