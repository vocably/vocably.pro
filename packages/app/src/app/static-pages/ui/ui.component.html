@switch (componentName) {
  @case ('sf') {
    <app-card-sf [card]="card"></app-card-sf>
  }
  @case ('sb') {
    <app-card-sb [card]="card"></app-card-sb>
  }
  @case ('mf') {
    Multichoice front
  }
  @case ('mb') {
    Multichoice back
  }
  @case ('ab') {
    Type to respond
  }
  @default {
    Unrecognized component {{ componentName }}
  }
}
