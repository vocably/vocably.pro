<div class="container top">
  <app-header></app-header>
</div>
<div class="container bottom">
  <div class="hero">
    <div *ngIf="extensionCanBeInstalled && extensionIsInstalled === false">
      <p>
        {{ 'welcome.no_extension' | transloco }}
      </p>
      <p>
        <a class="button mr-1" [href]="extensionInstallUrl" target="_blank">{{
          'welcome.install_extension' | transloco
        }}</a>
        <app-expansion
          [label]="'welcome.no_install' | transloco"
          panelStyle="padding-top: 1rem;"
        >
          <p>{{ 'welcome.use_mobile' | transloco }}</p>
          <p>{{ 'welcome.scan_qr' | transloco }}</p>
          <p>
            <app-app-qr-code style="width: 300px"></app-app-qr-code>
          </p>
          <p>{{ 'welcome.open_mobile_link' | transloco }}</p>
          <div>
            <a
              style="font-size: 160%"
              href="https://vocably.pro/app.html"
              target="_blank"
              >https://vocably.pro/app.html</a
            >
          </div>
        </app-expansion>
      </p>
      <p></p>
    </div>
    <router-outlet *ngIf="extensionIsInstalled === true"></router-outlet>
  </div>
</div>
