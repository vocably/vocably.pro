<div class="display-inline-flex align-items-center">
  <span class="mr-0_5"
    ><mat-icon
      aria-hidden="false"
      aria-label="Language"
      class="middle text-primary small"
      inline="true"
      >language</mat-icon
    ></span
  >
  <ng-container *ngIf="languages.length > 1">
    <mat-select
      value="{{ value }}"
      (selectionChange)="onChange($event.value)"
      [panelWidth]="null"
      class="select"
    >
      @for (language of languages; track language) {
      <mat-option [value]="language">{{ language | language }}</mat-option>
      }
    </mat-select>
  </ng-container>
  <span
    *ngIf="languages.length === 1"
    style="margin-top: 2px"
    class="small text-emphasize"
    data-test="only-deck"
    >{{ languages[0] | language }}</span
  >
</div>
