<div class="text-center">
  <div class="mb-1">
    <button class="button" (click)="auth.signIn()">
      {{ 'auth.sign_in.button' | transloco }}
    </button>
  </div>
  <div class="small">
    {{ 'auth.sign_in.agree' | transloco }}
    <a [href]="wwwBaseUrl + '/terms-and-conditions.html'" target="_blank">{{
      'auth.sign_in.terms' | transloco
    }}</a>
    {{ 'auth.sign_in.and' | transloco }}
    <a [href]="wwwBaseUrl + '/privacy-policy.html'" target="_blank">{{
      'auth.sign_in.privacy' | transloco
    }}</a
    >.
  </div>
</div>
