<div class="container-xl top"><app-header></app-header></div>
<div class="container bottom">
  <div class="hero">
    <div
      class="hero-body"
      style="display: flex; align-items: center; justify-content: center"
    >
      <div class="text-center">
        <ng-container *ngIf="isLoading">
          <ion-spinner name="dots" class="mr-1"></ion-spinner
          >{{ 'auth.sign_in_success.loading' | transloco }}
        </ng-container>
        <ng-container *ngIf="!isLoading">
          <div class="mb-1">
            {{ 'auth.sign_in_success.signed_in' | transloco }}
          </div>
          <div class="mb-1" *ngIf="!canBeAutomaticallyClosed">
            {{ 'auth.sign_in_success.tab_can_close' | transloco }}
          </div>
          <div
            class="mb-1"
            style="margin-top: 2rem"
            *ngIf="canBeAutomaticallyClosed"
          >
            <button class="button block" (click)="closeTheTab()">
              {{ 'auth.sign_in_success.close_tab' | transloco }}
            </button>
          </div>
          <div>
            <a href="/welcome" class="button outline block">{{
              'auth.sign_in_success.show_how' | transloco
            }}</a>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>
