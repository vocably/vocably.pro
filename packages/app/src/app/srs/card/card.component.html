<div class="inner" [@hide]="userAnswer !== 'unknown'">
  <div
    class="card"
    [class.flip]="isFlipped"
    [@card]="userAnswer"
    (click)="onFlip()"
  >
    <div class="card-inner">
      <div appTextLength class="side front srs-card-font">
        <div class="side-content">
          <ng-content select="[front]"></ng-content>
        </div>
      </div>
      <div appTextLength class="side back srs-card-font">
        <div class="side-content">
          <ng-content select="[back]"></ng-content>
        </div>
      </div>
    </div>
  </div>
  <div class="control-elements">
    <button
      class="show-answer-button"
      [matTooltip]="'srs.card.space_hint' | transloco"
      matTooltipPosition="above"
      (click)="onFlip()"
    >
      {{
        isFlipped
          ? ('srs.card.show_question' | transloco)
          : ('srs.card.show_answer' | transloco)
      }}
    </button>
    <div class="rate">
      <button
        class="button outline"
        (click)="userAnswer = 1"
        [matTooltip]="'srs.card.left_arrow' | transloco"
      >
        <mat-icon
          aria-hidden="false"
          [attr.aria-label]="'srs.card.weak' | transloco"
          inline="true"
          >close</mat-icon
        ><span>{{ 'srs.card.not_yet' | transloco }}</span>
      </button>
      <button
        class="button outline"
        (click)="userAnswer = 3"
        [matTooltip]="'srs.card.down_arrow' | transloco"
      >
        <mat-icon
          aria-hidden="false"
          [attr.aria-label]="'srs.card.somewhat' | transloco"
          inline="true"
          >done</mat-icon
        ><span>{{ 'srs.card.almost' | transloco }}</span>
      </button>
      <button
        class="button outline"
        (click)="userAnswer = 5"
        [matTooltip]="'srs.card.right_arrow' | transloco"
      >
        <mat-icon
          aria-hidden="false"
          [attr.aria-label]="'srs.card.strong' | transloco"
          inline="true"
          >done_all</mat-icon
        ><span>{{ 'srs.card.got_it' | transloco }}</span>
      </button>
    </div>
  </div>
  <div
    class="operation"
    [class.somewhat]="userAnswer === 3"
    [class.weak]="userAnswer === 1"
    [class.strong]="userAnswer === 5"
    [@operation]="userAnswer === 'unknown' ? 'unknown' : 'known'"
    (@operation.done)="onHideAnimationCompleted()"
  >
    <mat-icon
      aria-hidden="false"
      [attr.aria-label]="'srs.card.strong' | transloco"
      inline="true"
      class="operation-icon strong-icon"
      >done_all</mat-icon
    >
    <mat-icon
      aria-hidden="false"
      [attr.aria-label]="'srs.card.somewhat' | transloco"
      inline="true"
      class="operation-icon somewhat-icon"
      >done</mat-icon
    >
    <mat-icon
      aria-hidden="false"
      [attr.aria-label]="'srs.card.weak' | transloco"
      inline="true"
      class="operation-icon weak-icon"
      >close</mat-icon
    >
  </div>
</div>
