<div class="text-left">
  <span class="text-emphasize">{{ card.data.source }}</span>
  @if (card.data.partOfSpeech) {
    <span class="pos muted inline-block ml-0_5">{{
      card.data.partOfSpeech
    }}</span>
  }
  @if (card.data.ipa) {
    <span class="pos inline-block ml-0_5"
      >/{{ sanitizeTranscript(card.data.ipa) }}/</span
    >
  }
  @if (card.data.example) {
    <ul style="font-size: 60%" text-list [text]="card.data.example"></ul>
  }
</div>
