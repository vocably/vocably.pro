<app-srs-grade
  *ngFor="let card of cards.slice(0, 1)"
  [card]="card"
  [allCards]="cards"
  [studySteps]="studySteps"
  [prerenderedCards]="prerenderedCards"
  (grade)="onAnswer($event)"
></app-srs-grade>
<app-srs-success
  *ngIf="cards.length === 0"
  (oneMoreRound)="oneMoreRound.emit()"
  @displayComponent
></app-srs-success>
