<div class="inner">
  <div class="question srs-card-font">
    @if (reverse) {
      <app-srs-reverse-front [card]="card" />
    } @else {
      <app-srs-front [card]="card" />
    }
  </div>
  <div class="options">
    @for (option of options; track option.id) {
      <button
        class="button outline"
        [class.wrong]="wrongfullySelected.includes(option)"
        [disabled]="wrongfullySelected.includes(option)"
        (click)="onOptionClick(option)"
      >
        {{ reverse ? option.data.source : option.data.translation }}
      </button>
    }
  </div>
</div>
