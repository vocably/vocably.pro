<div class="streak-container">
  <div class="numbers-wrapper">
    <div class="number previous" @slideOut [@.disabled]="hasBeenShown">
      {{ previousValue }}
    </div>

    <div class="number current" @slideIn [@.disabled]="hasBeenShown">
      {{ currentValue }}
    </div>
  </div>

  <div class="subtitle">
    {{
      currentValue === 1
        ? ('srs.streak.consecutive_day' | transloco)
        : ('srs.streak.consecutive_days' | transloco)
    }}
  </div>

  <div class="days-list">
    <div
      class="day-item"
      *ngFor="let day of days; let i = index"
      [class.checked]="day.checked"
      [class.last-checked]="isLastChecked(i)"
      [@pop]
      [@.disabled]="!isLastChecked(i)"
    >
      <div class="day-circle">
        <span class="day-text">{{ dayToString(day.day) }}</span>
      </div>
    </div>
  </div>
</div>
