<div class="header">
  <vocably-logo style="height: 1.1rem"></vocably-logo>
  <div
    *ngIf="needsOnboarding"
    class="text-center"
    style="position: relative; top: -1px; margin-left: 0.22rem"
  >
    {{ 'home.almost_ready' | translate }}
  </div>
  <a class="settings" [routerLink]="['settings']"
    ><mat-icon>page_info</mat-icon> {{ 'home.settings' | translate }}</a
  >
</div>

<div *ngIf="!languagePairsLoaded" class="mt-2">
  <ion-spinner name="dots"></ion-spinner>
  {{ 'home.loading_presets' | translate }}
</div>

<ng-container *ngIf="languagePairsLoaded">
  <div style="margin-top: 2rem" *ngIf="needsOnboarding">
    <div>
      <a
        [href]="welcomeUrl"
        target="_blank"
        class="button block"
        style="white-space: nowrap"
        >{{ 'home.setup' | translate }}</a
      >
    </div>
  </div>

  <ng-container *ngIf="!needsOnboarding">
    <vocably-search-form
      class="block"
      (valuesChange)="onSearchValuesChanged($any($event).detail)"
      (formSubmit)="onSearchFormSubmit($any($event).detail)"
      [values]="searchValues"
      [loading]="isSearching"
      [hideHint]="isSearching || !!searchResult"
      [autoFocus]="true"
      [languagePairs]="languagePairs"
    ></vocably-search-form>
    <vocably-skeleton-loader
      *ngIf="isSearching && !searchResult"
      style="margin-top: 1rem"
    ></vocably-skeleton-loader>
    <div
      *ngIf="isSearching && searchResult"
      class="text-center floating-loading"
      style="margin-top: 1rem; font-size: 0.9rem"
    >
      <ion-spinner name="dots"></ion-spinner>
      {{ 'home.requesting_chatgpt' | translate }}
    </div>

    <vocably-translation
      *ngIf="searchResult"
      style="margin-top: 12px"
      class="search-result"
      [explanation]="explanationState"
      [explanationAnimationDelay]="explanationAnimationDelay"
      [askForRating]="this.askForRating"
      [extensionPlatform]="extensionPlatform"
      (ratingInteraction)="saveAskForRating($event)"
      [result]="searchResult"
      [showSaveHint]="false"
      [showLanguages]="false"
      [hideChatGpt]="true"
      [loading]="isTranslationLoading"
      [isRetrying]="isRetrying"
      (addCard)="addCard($event)"
      (removeCard)="removeCard($event)"
      (retry)="onRetry()"
      [updateCard]="updateCard"
      [attachTag]="attachTag"
      [detachTag]="detachTag"
      [deleteTag]="deleteTag"
      [updateTag]="updateTag"
      [playAudioPronunciation]="playAudioPronunciation"
      [maxCards]="maxCards"
      [paymentLink]="paymentLink"
    ></vocably-translation>
  </ng-container>
</ng-container>
