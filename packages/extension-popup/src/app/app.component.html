<div class="container">
  <ng-container *ngIf="isLoggedIn === 'undefined'"
    ><ion-spinner name="dots"></ion-spinner>
    {{ 'app.checking_auth' | translate }}
  </ng-container>
  <ng-container *ngIf="isLoggedIn === 'yes'">
    <router-outlet></router-outlet>
  </ng-container>
  <div *ngIf="isLoggedIn === 'no'">
    <p class="mb-1">
      {{ 'app.translates_text' | translate }}
    </p>
    <p class="mb-1">{{ 'app.flashcards_mobile' | translate }}</p>
    <p class="mb-1">{{ 'app.need_signed_in' | translate }}</p>
    <a
      [href]="loginUrl"
      target="_blank"
      class="button block"
      style="white-space: nowrap"
      >{{ 'app.sign_in' | translate }}</a
    >
  </div>
</div>
